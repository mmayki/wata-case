<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Школьный дневник</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        background: #f1f5f9;
        padding: 16px;
        padding-bottom: 40px;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
      }
      .card {
        background: white;
        border-radius: 24px;
        padding: 20px;
        margin-bottom: 16px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        transition: all 0.2s;
      }
      .header {
        font-size: 28px;
        font-weight: bold;
        margin-bottom: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .subtitle {
        color: #475569;
        font-size: 14px;
        margin-bottom: 16px;
      }
      button {
        background: #3b82f6;
        color: white;
        border: none;
        padding: 10px 18px;
        border-radius: 40px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: 0.2s;
      }
      button:active {
        transform: scale(0.96);
      }
      button.outline {
        background: white;
        border: 1px solid #cbd5e1;
        color: #1e293b;
      }
      .grade {
        display: inline-block;
        background: #eef2ff;
        color: #1e40af;
        font-weight: bold;
        padding: 6px 12px;
        border-radius: 30px;
        font-size: 14px;
        margin-right: 8px;
        margin-bottom: 8px;
      }
      .subject-title {
        font-weight: 600;
        font-size: 18px;
        margin-top: 16px;
        margin-bottom: 8px;
        color: #0f172a;
      }
      .homework-item {
        background: #f8fafc;
        padding: 12px;
        border-radius: 16px;
        margin-bottom: 8px;
      }
      .login-input {
        width: 100%;
        padding: 14px;
        margin-bottom: 12px;
        border: 1px solid #cbd5e1;
        border-radius: 20px;
        font-size: 16px;
      }
      .badge {
        background: #e2e8f0;
        padding: 4px 12px;
        border-radius: 40px;
        font-size: 12px;
      }
      .flex-between {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .grade-form {
        margin-top: 12px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      select,
      input {
        padding: 8px 12px;
        border-radius: 40px;
        border: 1px solid #cbd5e1;
        font-size: 14px;
      }
      hr {
        margin: 16px 0;
        border: none;
        border-top: 1px solid #e2e8f0;
      }
      .icon {
        font-size: 24px;
      }
      @media (max-width: 480px) {
        body {
          padding: 12px;
        }
        .card {
          padding: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container" id="app"></div>

    <script>
      // ---------- ДАННЫЕ ПО УМОЛЧАНИЮ (как при первом запуске) ----------
      const DEFAULT_DATA = {
        students: [
          { id: "alice", name: "Алиса С.", password: "123", class: "7А" },
          { id: "bob", name: "Борис К.", password: "123", class: "7А" },
        ],
        teachers: [
          {
            id: "teacher1",
            name: "Мария Ивановна",
            password: "admin",
            subject: "Математика",
          },
        ],
        grades: {
          alice: {
            Математика: [5, 4, 5, 5],
            "Русский язык": [4, 4, 5],
            Физика: [5, 5],
          },
          bob: {
            Математика: [3, 4, 3],
            "Русский язык": [5, 5, 4],
            Физика: [4, 4],
          },
        },
        homework: {
          "7А": {
            Математика: "№345, стр 56, подготовиться к контрольной",
            "Русский язык": "упражнение 120, выучить правила",
            Физика: "параграф 18, ответить на вопросы",
          },
        },
        schedule: {
          "7А": [
            "Математика",
            "Русский язык",
            "Физика",
            "История",
            "Литература",
          ],
        },
      };

      // Загружаем данные из localStorage или используем DEFAULT
      function loadData() {
        const saved = localStorage.getItem("school_diary");
        if (saved) {
          try {
            return JSON.parse(saved);
          } catch (e) {
            return DEFAULT_DATA;
          }
        }
        return DEFAULT_DATA;
      }

      function saveData(data) {
        localStorage.setItem("school_diary", JSON.stringify(data));
      }

      let DB = loadData();
      let currentUser = null; // { role, id, name, class? }

      // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----------
      function saveAndRender() {
        saveData(DB);
        renderApp();
      }

      function logout() {
        currentUser = null;
        renderApp();
      }

      // Поставить оценку (только для учителя)
      function addGrade(studentId, subject, gradeValue) {
        if (!DB.grades[studentId]) DB.grades[studentId] = {};
        if (!DB.grades[studentId][subject]) DB.grades[studentId][subject] = [];
        DB.grades[studentId][subject].push(Number(gradeValue));
        saveAndRender();
      }

      // Добавить/обновить домашку (учитель)
      function setHomework(className, subject, text) {
        if (!DB.homework[className]) DB.homework[className] = {};
        DB.homework[className][subject] = text;
        saveAndRender();
      }

      // ---------- ЭКРАН ВХОДА ----------
      function LoginScreen() {
        const container = document.createElement("div");
        container.innerHTML = `
            <div class="card" style="text-align: center;">
                <div class="header">📚 Школьный дневник</div>
                <div class="subtitle">Вход для учеников и учителей</div>
                <input type="text" id="loginId" class="login-input" placeholder="Логин (alice / bob / teacher1)" autocomplete="off">
                <input type="password" id="loginPassword" class="login-input" placeholder="Пароль (для всех 123, учитель admin)">
                <button id="loginBtn" style="width: 100%;">Войти</button>
                <hr>
                <div class="badge">🔑 Демо-логины: alice/123, bob/123, teacher1/admin</div>
            </div>
        `;
        const loginBtn = container.querySelector("#loginBtn");
        const loginId = container.querySelector("#loginId");
        const loginPass = container.querySelector("#loginPassword");

        loginBtn.onclick = () => {
          const id = loginId.value.trim();
          const pass = loginPass.value.trim();
          // ученик
          const student = DB.students.find(
            (s) => s.id === id && s.password === pass,
          );
          if (student) {
            currentUser = {
              role: "student",
              id: student.id,
              name: student.name,
              class: student.class,
            };
            return renderApp();
          }
          // учитель
          const teacher = DB.teachers.find(
            (t) => t.id === id && t.password === pass,
          );
          if (teacher) {
            currentUser = {
              role: "teacher",
              id: teacher.id,
              name: teacher.name,
              subject: teacher.subject,
            };
            return renderApp();
          }
          alert("Неверный логин или пароль");
        };
        return container;
      }

      // ---------- ПАНЕЛЬ УЧЕНИКА ----------
      function StudentPanel(user) {
        const studentId = user.id;
        const className = user.class;
        const gradesMap = DB.grades[studentId] || {};
        const scheduleList = DB.schedule[className] || [];
        const homeworkMap = DB.homework[className] || {};

        const container = document.createElement("div");
        container.innerHTML = `
            <div class="flex-between">
                <div class="header">👩‍🎓 ${user.name}</div>
                <button id="logoutBtn" class="outline">Выйти</button>
            </div>
            <div class="badge">${className} класс</div>
            
            <div class="card">
                <div class="flex-between">
                    <strong>📅 Расписание на неделю</strong>
                </div>
                <div id="scheduleList" style="margin-top: 12px;"></div>
            </div>

            <div class="card">
                <strong>⭐ Мои оценки</strong>
                <div id="gradesBlock" style="margin-top: 12px;"></div>
            </div>

            <div class="card">
                <strong>📖 Домашнее задание</strong>
                <div id="homeworkBlock" style="margin-top: 12px;"></div>
            </div>
        `;

        // расписание
        const scheduleDiv = container.querySelector("#scheduleList");
        scheduleDiv.innerHTML =
          scheduleList
            .map(
              (subj) => `<div class="badge" style="margin:4px;">${subj}</div>`,
            )
            .join("") || "Нет расписания";

        // оценки
        const gradesDiv = container.querySelector("#gradesBlock");
        if (Object.keys(gradesMap).length === 0) {
          gradesDiv.innerHTML = "<div>Пока нет оценок</div>";
        } else {
          let html = "";
          for (let [subject, marks] of Object.entries(gradesMap)) {
            const marksHtml = marks
              .map((m) => `<span class="grade">${m}</span>`)
              .join("");
            const average = (
              marks.reduce((a, b) => a + b, 0) / marks.length
            ).toFixed(1);
            html += `<div><strong>${subject}</strong> ${marksHtml} <span style="font-size:13px;">(ср: ${average})</span></div>`;
          }
          gradesDiv.innerHTML = html;
        }

        // домашнее задание
        const homeworkDiv = container.querySelector("#homeworkBlock");
        if (Object.keys(homeworkMap).length === 0) {
          homeworkDiv.innerHTML = "<div>Нет заданий</div>";
        } else {
          let html = "";
          for (let [subject, task] of Object.entries(homeworkMap)) {
            html += `<div class="homework-item"><strong>${subject}</strong><br>${task}</div>`;
          }
          homeworkDiv.innerHTML = html;
        }

        container.querySelector("#logoutBtn").onclick = logout;
        return container;
      }

      // ---------- ПАНЕЛЬ УЧИТЕЛЯ ----------
      function TeacherPanel(user) {
        const container = document.createElement("div");
        const studentsList = DB.students;
        const classNames = [...new Set(studentsList.map((s) => s.class))];

        container.innerHTML = `
            <div class="flex-between">
                <div class="header">👩‍🏫 ${user.name} (${user.subject})</div>
                <button id="logoutBtn" class="outline">Выйти</button>
            </div>
            <div class="card">
                <strong>➕ Поставить оценку</strong>
                <div class="grade-form">
                    <select id="studentSelect">
                        ${studentsList.map((s) => `<option value="${s.id}">${s.name} (${s.class})</option>`).join("")}
                    </select>
                    <input type="text" id="subjectInput" placeholder="Предмет" value="${user.subject}" list="subjectsList">
                    <datalist id="subjectsList">
                        <option>Математика</option><option>Русский язык</option><option>Физика</option><option>История</option><option>Литература</option>
                    </datalist>
                    <select id="gradeValue">
                        <option>5</option><option>4</option><option>3</option><option>2</option>
                    </select>
                    <button id="addGradeBtn">Поставить</button>
                </div>
            </div>
            <div class="card">
                <strong>📝 Задать домашнее задание</strong>
                <div class="grade-form" style="flex-direction:column;">
                    <select id="classSelect">
                        ${classNames.map((c) => `<option value="${c}">${c} класс</option>`).join("")}
                    </select>
                    <input type="text" id="homeworkSubject" placeholder="Предмет" value="${user.subject}">
                    <textarea id="homeworkText" rows="2" placeholder="Описание задания..." style="border-radius:20px;padding:10px;"></textarea>
                    <button id="setHomeworkBtn">Добавить/Обновить</button>
                </div>
            </div>
            <div class="card">
                <strong>📖 Текущее домашнее задание по классам</strong>
                <div id="homeworkPreview"></div>
            </div>
        `;

        // добавление оценки
        container.querySelector("#addGradeBtn").onclick = () => {
          const studentId = container.querySelector("#studentSelect").value;
          const subject = container.querySelector("#subjectInput").value.trim();
          const grade = container.querySelector("#gradeValue").value;
          if (!subject) {
            alert("Введите предмет");
            return;
          }
          addGrade(studentId, subject, grade);
        };

        // задать домашку
        container.querySelector("#setHomeworkBtn").onclick = () => {
          const className = container.querySelector("#classSelect").value;
          const subject = container
            .querySelector("#homeworkSubject")
            .value.trim();
          const text = container.querySelector("#homeworkText").value.trim();
          if (!subject || !text) {
            alert("Заполните предмет и задание");
            return;
          }
          setHomework(className, subject, text);
        };

        // предпросмотр домашки
        const previewDiv = container.querySelector("#homeworkPreview");
        function refreshPreview() {
          let html = "";
          for (let [cls, subs] of Object.entries(DB.homework)) {
            html += `<div style="margin-top:12px;"><strong>${cls} класс</strong><br>`;
            for (let [sub, task] of Object.entries(subs)) {
              html += `<span class="badge" style="background:#e6f0ff; margin:4px;">${sub}: ${task.substring(0, 50)}...</span>`;
            }
            html += `</div>`;
          }
          previewDiv.innerHTML = html || "Нет заданий";
        }
        refreshPreview();

        // обновляем предпросмотр при каждом изменении (пересохраняется через saveAndRender)
        const origSetHomework = setHomework;
        window.setHomework = (c, s, t) => {
          origSetHomework(c, s, t);
          refreshPreview();
        };

        container.querySelector("#logoutBtn").onclick = logout;
        return container;
      }

      // ---------- ГЛАВНЫЙ РЕНДЕР ----------
      function renderApp() {
        const app = document.getElementById("app");
        if (!currentUser) {
          app.innerHTML = "";
          app.appendChild(LoginScreen());
        } else if (currentUser.role === "student") {
          app.innerHTML = "";
          app.appendChild(StudentPanel(currentUser));
        } else if (currentUser.role === "teacher") {
          app.innerHTML = "";
          app.appendChild(TeacherPanel(currentUser));
        }
      }

      // Стартуем приложение
      renderApp();
    </script>
  </body>
</html>
