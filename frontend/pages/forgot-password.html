<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Восстановление пароля</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/login.css" />
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <div class="login-icon">🔐</div>
        <h1 class="header" style="text-align: center">Восстановление пароля</h1>
        <div class="subtitle" style="text-align: center">
          Введите ваш логин, чтобы сбросить пароль
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <h4 class="input-title">Логин</h4>
        <input type="text" id="username" class="input" placeholder="Логин" />

        <h4 class="input-title">Новый пароль</h4>
        <input
          type="password"
          id="newPassword"
          class="input"
          placeholder="Новый пароль"
        />

        <button id="resetBtn" class="btn">Сбросить пароль</button>

        <div class="subtitle" style="text-align: center; margin-top: 20px">
          <a href="login.html">Вернуться ко входу</a>
        </div>
      </div>
    </div>

    <script>
      document
        .getElementById("resetBtn")
        ?.addEventListener("click", async () => {
          const username = document.getElementById("username").value.trim();
          const newPassword = document.getElementById("newPassword").value;

          if (!username || !newPassword) {
            alert("Заполните все поля");
            return;
          }

          try {
            const response = await fetch(
              "http://localhost:3000/api/reset-password",
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, newPassword }),
              },
            );

            const data = await response.json();

            if (!response.ok) throw new Error(data.error);

            document.getElementById("successMessage").textContent =
              "✅ Пароль сброшен! Перенаправление...";
            document.getElementById("successMessage").style.display = "block";

            setTimeout(() => {
              window.location.href = "login.html";
            }, 2000);
          } catch (error) {
            document.getElementById("errorMessage").textContent = error.message;
            document.getElementById("errorMessage").style.display = "block";
          }
        });
    </script>
  </body>
</html>
