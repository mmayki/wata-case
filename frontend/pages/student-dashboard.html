<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Главная</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/student-dashboard.css" />
  </head>
  <body>
    <div class="dashboard-container">
      <!-- Хедер -->
      <div class="dashboard-header">
        <div class="greeting">
          <h1>Доброе утро, <span id="userName"></span></h1>
          <div class="stats-row">
            <div class="stat-card">
              <div class="stat-value" id="userScore">67</div>
              <div class="stat-label">⭐ Всего баллов</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="todayScore">0</div>
              <div class="stat-label">📅 Баллов за сегодня</div>
            </div>
          </div>
        </div>
        <div class="progress-card">
          <div class="progress-label">Процент выполнения задач</div>
          <div class="progress-motivation">Продолжай в том же духе!</div>
          <div class="progress-circle-wrapper">
            <div class="progress-circle-small">
              <svg viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="42" class="progress-bg-small" />
                <circle
                  cx="50"
                  cy="50"
                  r="42"
                  class="progress-fill-small"
                  id="progressFillSmall"
                />
                <text
                  x="50"
                  y="55"
                  text-anchor="middle"
                  class="progress-text-small"
                  id="progressPercentSmall"
                >
                  85%
                </text>
              </svg>
            </div>
          </div>
        </div>
      </div>
      <!-- Задачи и расписание -->
      <div class="two-columns">
        <!-- Календарь задач -->
        <div class="card">
          <div class="card-header">
            <strong>📅 Задачи</strong>
            <div class="month-nav">
              <button id="prevMonth" class="month-nav-btn">←</button>
              <span class="month" id="currentMonth">Апрель 2026</span>
              <button id="nextMonth" class="month-nav-btn">→</button>
            </div>
          </div>
          <div class="calendar-week" id="calendarWeek"></div>
          <div class="task-filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="active">
              Не выполнено
            </button>
          </div>
          <div id="tasksList" class="tasks-list"></div>
          <button id="addTaskBtn" class="add-task-btn">
            + Добавить задачу
          </button>
        </div>

        <!-- Расписание на сегодня -->
        <div class="card">
          <div class="card-header">
            <strong>⏰ Расписание на сегодня</strong>
          </div>
          <div class="schedule-timeline" id="scheduleTimeline"></div>
        </div>
      </div>

      <!-- Таблица лидеров -->
      <div class="card">
        <div class="card-header">
          <strong>🏆 Таблица лидеров</strong>
        </div>
        <div class="leaderboard">
          <div class="leaderboard-header">
            <span>№</span>
            <span>Имя</span>
            <span>Средний балл</span>
          </div>
          <div id="leaderboardList"></div>
        </div>
      </div>

      <!-- Кнопка назад -->
      <button id="backBtn" class="btn-back">← Назад</button>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/student-dashboard.js"></script>
  </body>
</html>
